add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

palette = 'colors'

[palettes.colors]
color1 = '{{colors.primary_fixed_dim.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface_variant.default.hex}}'
color4 = '{{colors.surface_container.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.surface_dim.default.hex}}'
color7 = '{{colors.surface.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

[fill]
symbol = '-'
style = 'fg:color3'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:color9)"
error_symbol = "[пҖҚ пҒӢ](bold fg:color8)"

[git_branch]
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = "[ у°ңҘ ](fg:color8)[оӮ¶](fg:color8 bg:color4)[ $symbol $branch(:$remote_branch) ](fg:color3 bg:color4)[оӮҙ](fg:color4)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[оӮ¶](fg:color8)[ вҖў$hostname ](fg:color3 bg:color4)[оӮҙ](fg:color4)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_root = "red bold"
format = "[оӮ¶](fg:color8)[ $user ](fg:color3 bg:color4)[оӮҙ](fg:color4)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
truncation_length = 1
truncation_symbol = ".../"
format = "[оӮ¶](fg:color8)[ у°үӢ вҶ’ $path ](fg:color3 bg:color4)[оӮҙ](fg:color4)"

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = "[оӮ¶](fg:color8)[ у°Әў $duration ](fg:color3 bg:color4)[оӮҙ](fg:color4)"