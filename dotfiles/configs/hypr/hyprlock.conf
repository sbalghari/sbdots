source = $HOME/.config/hypr/colors.conf

$accent = $accent_color
$accentAlpha = $accent_color
$text = $on_surface
$textAlpha = $on_surface
$base = $background
$red = $error
$yellow = $tertiary

$font = JetBrainsMono Nerd Font

# GENERAL
general {
  disable_loading_bar = true
  hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = $HOME/.cache/current.wall

    blur_passes = 3
    blur_size = 6

    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.05

    color = $base
}

# LAYOUT
label {
  monitor =
  text = Layout: $LAYOUT
  color = $text
  font_size = 11
  font_family = $font
  position = 10, 10
  halign = left
  valign = bottom
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 32
  font_family = $font
  position = -10, 32
  halign = right
  valign = bottom
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 11
  font_family = $font
  position = -10, 10
  halign = right
  valign = bottom
}

# USER AVATAR
image {
  monitor =
  path = $HOME/avatar
  size = 500, 500
  border_color = $accent
  position = 0, 50
  halign = center
  valign = center
}

# USER
label {
  monitor =
  text = <i>󰌾 Logged in as</i> $USER
  color = $text
  font_size = 11
  font_family = $font
  position = 0, 10
  halign = center
  valign = bottom
}

# INPUT FIELD
input-field {
  monitor = 
  size = 162, 28
  outline_thickness = 2
  dots_size = 0.3
  dots_spacing = 0.2]
  dots_center = true
  outer_color = $accent
  inner_color = $base
  font_color = $tertiary
  fade_on_empty = false
  placeholder_text = enter password
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -70
  halign = center
  valign = center
}