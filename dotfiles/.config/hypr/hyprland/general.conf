
general {
    gaps_in = 2
    gaps_out = 5
    gaps_workspaces = 0

    border_size = 1

    col.active_border = rgba(cdd6f4a1)
    col.inactive_border = rgba(1e1e2ea1)
    col.nogroup_border_active = rgba(cdd6f4a1)
    col.nogroup_border = rgba(1e1e2ea1)


    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    layout = dwindle
    no_focus_fallback = true
    allow_tearing = false

    snap {
        enabled = true
        window_gap = 5
        monitor_gap = 5
        border_overlap = true
    }
}
